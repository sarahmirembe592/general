{% extends 'base.html' %}
{% block content %}

<style>
  body {
    background-color: white; 
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center; 
    padding: 20px;
  }


  .container-fluid {
    max-width: 800px; 
    background: #ffffff; 
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
  }


  h1 {
    color: black;
    font-weight: 700;
    text-align: center;
    margin-bottom: 5px;
  }
  h3 {
    text-align: center;
      color: blue;
    margin-bottom: 30px;
  }

 


  p {
    font-weight: bold;
    color: blue; 
    border-bottom: 2px solid #e9ecef;
    padding-bottom: 5px;
    margin-top: 25px;
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 1px;
     text-align: center;
  }

  label {
    font-weight: 500px;
    margin-bottom: 5px;
    color: #34495e;
  }

  .form-control, .form-select {
    border-radius: 8px;
    padding: 10px 15px;
    border: 1px solid #dcdde1;
  }

  .form-control:focus {
    border-color: #198754;
    box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
  }

  .btn-lg {
    padding: 12px 25px;
    font-weight: 600;
    border-radius: 8px;
    margin-top: 20px;
  }
  button {
    grid-column: span 2;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: green;
    color: white;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: green;
}
  
/* Navbar Container */
.navbar {
  display: flex;
  justify-content: space-between; /* Pushes logo and links to opposite sides */
  align-items: center;
  padding: 15px 30px;
  background-color: #333;
  color: white;
  position: sticky; /* Keeps navbar at the top while scrolling */
  top: 0;
  z-index: 1000;
  margin-top: 20px;
}

/* Logo Styling */
.logo {
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
}

/* Links Layout */
.nav-links {
  list-style: none; /* Removes bullet points */
  display: flex;
  gap: 20px; /* Space between links */
}

/* Individual Link Styling */
.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: color 0.3s ease;
}

/* Hover Effect */
.nav-links a:hover {
  color: #04AA6D; /* Changes color on hover */
}

/* Action Button (Optional) */
.cta {
  background-color: #04AA6D;
  padding: 8px 15px;
  border-radius: 5px;
}

.cta:hover {
  background-color: #059862;
  color: white !important;
}

</style>
  </head>

<body> 
     <nav class="navbar">
  <div class="logo">Welcome to Nyondo</div>
  <ul class="nav-links">
    <li><a href="/">Stock</a></li>
    <li><a href="/home1">Sales</a></li>
    <!-- <li><a href="/home2">Home2</a></li> -->
    <li><a href="/home3">Customers</a></li>
  </ul>
</nav>
<div class="container-fluid">
  <h1><i class="fa-solid fa-wrench"></i>Nyondo General Hardware Limited</h1>
  <h3>Sales Registration Form</h3>
  <form method="POST" action="{% url 'add1'%}" class="row g-3">
    {% csrf_token %}
    <!-- customer information -->
    <p>CUSTOMER INFORMATION</p>
    <div class="col">
      <label for="Customer Name">Customer Name</label>
      <input type="text" name="customer_name" class="form-control" placeholder="Full name" aria-label="Full name" required>
    </div>
    <!-- <div class="col-md-6">
      <label for="phonenumber">Phone Number</label>
      <input type="tel" name="phone_number" class="form-control" placeholder="0xxxxx" required>
    </div>
    <div class="col-12">
      <label for="address">Address</label>
      <input type="text" name="address" class="form-control" placeholder="1234 Main St" required>
    </div> -->
<!-- product details -->
    <p>PRODUCT DETAILS</p>
    <div class="col">
      <label for="category">Category</label>
      <select class="form-select" name="category">
        <option selected> select Category</option>
        <option>Building Material</option>
        <option>Paint & Finishes</option>
        <option>Fasteners</option>
        <option>Others(Tools)</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="productname">Product Name</label>
      <select class="form-select" name="product_name">
        <option selected> select Product</option>
         <option value="CEM IIN">Cement - CEM IIN</option>
        <option value="CEM IIIN">Cement - CEM IIIN</option>

        <option value="BAR 10MM">Iron Bar - 10MM</option>
        <option value="BAR 12MM">Iron Bar - 12MM</option>
        <option value="BAR 16MM">Iron Bar - 16MM</option>

        <option value="NAIL 0001">Nails - 1 inch</option>
        <option value="NAIL 0003">Nails - 3 inch</option>
        <option value="NAIL 0004">Nails - 4 inch</option>
        <option value="NAIL 0005">Nails - 5 inch</option>
        <option value="ROOF NAIL">Roofing Nails</option>
        <option value="BARBED HIGH">Barbed Wire - High Tensile</option>
        <option value="BARBED LOW">Barbed Wire - Low Tensile</option>
        <option>Roofing nails</option>
        <option>Wheelbarrows</option>
        <option>Wire mesh</option>
        <option>Iron sheets(colors & guages)</option>
      </select>
    </div>
    <div class="row">
      <div class="col">
        <label for="quantity">Quantity</label>
        <input type="number" name="quantity" class="form-control" required>
      </div>
      <div class="col">
        <label for="unit price">Unit Price(UGX)</label>
        <input type="number" name="unit_price" class="form-control" required>
      </div>
      <div class="col">
        <label for="total price">Total Price(UGX)</label>
        <input type="number" name="total_price" class="form-control" required>
      </div>
    </div>
    <!-- payment infomation -->
    <p>PAYMENT INFORMATION</p>
    <div class="row">
      <div class="col">
        <label for="Payment method">Payment Method</label>
        <select class="form-select" name="payment_method">
          <option selected> select Method</option>
          <option>Cash</option>
          <option>Mobile Money</option>
          <option>Bank Transfer</option>
          <option>Credit(Approved)</option>
        </select>
      </div>
      <div class="col">
        <label for="receipt number">Receipt Number</label>
        <input type="text" name="receipt_number" class="form-control" placeholder="eg REC-00123" required>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <!-- <label for="date of sale">Date of Sale</label>
        <input type="datetime-local" name="date" class="form-control" required>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label for="name of sales person">Name of Sales Person</label>
        <input type="text" name="name_of_sales_person" class="form-control" placeholder="Name of sales person" required>
      </div>
    </div> -->
    <!-- end part -->
    <div class="row">
      <div class="col">
        <button type="submit" class="btn btn-primary btn-lg">Register Sale</button>
      </div>
    </div>



  </form>
  </div>
    
{% endblock %}
