{% extends 'base.html' %}
{% block content %}

    <style>
 body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: #fff;
    width: 900px;
    padding: 20px 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 10px;
}

/* GRID */
form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px 20px;
}

/* SECTION HEADINGS */
.section {
    grid-column: span 2;
    font-weight: bold;
    font-size: 13px;
    color: #0d6efd;
    margin-top: 10px;
    
}

/* INPUT GROUP */
.col {
    display: flex;
    flex-direction: column;
}

/* LABEL */
label {
    font-size: 13px;
    margin-bottom: 4px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BUTTON */
button {
    grid-column: span 2;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: green;
    color: white;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: green;
}
/* Basic Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* Navbar Container */
.navbar {
  display: flex;
  justify-content: space-between; /* Pushes logo and links to opposite sides */
  align-items: center;
  padding: 15px 30px;
  background-color: #333;
  color: white;
  position: sticky; /* Keeps navbar at the top while scrolling */
  top: 0;
  z-index: 1000;
  margin-top: 20px;
}

/* Logo Styling */
.logo {
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
}

/* Links Layout */
.nav-links {
  list-style: none; /* Removes bullet points */
  display: flex;
  gap: 20px; /* Space between links */
}

/* Individual Link Styling */
.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: color 0.3s ease;
}

/* Hover Effect */
.nav-links a:hover {
  color: #04AA6D; /* Changes color on hover */
}

/* Action Button (Optional) */
.cta {
  background-color: #04AA6D;
  padding: 8px 15px;
  border-radius: 5px;
}

.cta:hover {
  background-color: #059862;
  color: white !important;
}

    </style>
</head>

<body>
    <nav class="navbar">
  <div class="logo">Welcome to Nyondo</div>
  <ul class="nav-links">
    <li><a href="/">Stock</a></li>
    <li><a href="/home1">Sales</a></li>
    <!-- <li><a href="/home2">Home2</a></li> -->
    <li><a href="/home3">customers</a></li>
    
  </ul>
</nav>


<div class="container">
    <h2>New Stock Entry</h2>

    <form method="POST" action="{% url 'add'%}">
        {% csrf_token %}

      
       <div class="section">ITEM IDENTIFICATION</div>

<div class="col">
    <label>Item Name</label>
    <input type="text" name="item_name" placeholder="Enter item name" required>
</div>

<div class="col">
    <label>Unit of Measure</label>
    <select name="unit">
        <option>select unit of measure</option>
        <option>Bags</option>
        <option>Pieces (Pcs)</option>
        <option>Kilograms (Kg)</option>
        <option>Meters (m)</option>
        <option>Rolls</option>
    </select>
</div>


<div class="section">INVENTORY & PRICING</div>

<div class="col">
    <label>Item Quantity</label>
    <input type="number" name="quantity" required>
</div>

<div class="col">
    <label>Item Unit Cost</label>
    <input type="number" name="unit_cost" placeholder="eg 4000" required>
</div>

<div class="col">
    <label>Item Selling Price</label>
    <input type="number" name="selling_price" required>
    
</div>



<div class="section">SUPPLIER & SPECIFICATION</div>

<div class="col">
    <label>Item Supplier Name</label>
    <input type="text" name="supplier" placeholder="eg Hima Cement Ltd" required>
</div>

<div class="col">
    <label>Product Specification</label>
    <select name="specification" required>
        <option value="">Select Specification</option>

        <option value="CEM IIN">Cement - CEM IIN</option>
        <option value="CEM IIIN">Cement - CEM IIIN</option>

        <option value="BAR 10MM">Iron Bar - 10MM</option>
        <option value="BAR 12MM">Iron Bar - 12MM</option>
        <option value="BAR 16MM">Iron Bar - 16MM</option>

        <option value="NAIL 0001">Nails - 1 inch</option>
        <option value="NAIL 0003">Nails - 3 inch</option>
        <option value="NAIL 0004">Nails - 4 inch</option>
        <option value="NAIL 0005">Nails - 5 inch</option>
        <option value="ROOF NAIL">Roofing Nails</option>

        <option value="WIRE MESH">Wire Mesh</option>
        <option value="BARBED HIGH">Barbed Wire - High Tensile</option>
        <option value="BARBED LOW">Barbed Wire - Low Tensile</option>
        <option value="others">Other tools</option>
        <option value="WHEEL BARROW">Wheel Barrow</option>
    </select>
</div>


<div class="section">PAYMENT</div>

<div class="col">
    <label>Mode of Payment</label>
    <select name="payment_mode" required>
        <option value="">Select</option>
        <option>Cash</option>
        <option>Mobile Money</option>
        <option>Bank Transfer</option>
        <option>Credit</option>
    </select> 
</div>

<div></div>
        <!-- Submit -->
        <button type="submit">Add Stock</button>

    </form>
</div>
    
{% endblock %}
