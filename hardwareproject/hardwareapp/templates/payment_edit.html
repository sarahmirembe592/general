{% extends 'base.html' %}
{% block content %}

<h2>Payment Edit</h2>
<form method="POST" action="{% url ''%}">
        {% csrf_token %}
<div class="section">ITEM IDENTIFICATION</div>

<div class="col">
    <label>Item Name</label>
    <input type="text" name="item_name" placeholder="Enter item name" required>
</div>

<div class="col">
    <label>Unit of Measure</label>
    <select name="unit">
        <option>select unit of measure</option>
        <option>Bags</option>
        <option>Pieces (Pcs)</option>
        <option>Kilograms (Kg)</option>
        <option>Meters (m)</option>
        <option>Rolls</option>
    </select>
</div>


<div class="section">INVENTORY & PRICING</div>

<div class="col">
    <label>Item Quantity</label>
    <input type="number" name="quantity" required>
</div>

<div class="col">
    <label>Item Unit Cost</label>
    <input type="number" name="unit_cost" placeholder="eg 4000" required>
</div>

<div class="col">
    <label>Item Selling Price</label>
    <input type="number" name="selling_price" required>
    
</div>



<div class="section">SUPPLIER & SPECIFICATION</div>

<div class="col">
    <label>Item Supplier Name</label>
    <input type="text" name="supplier" placeholder="eg Hima Cement Ltd" required>
</div>

<div class="col">
    <label>Product Specification</label>
    <select name="specification" required>
        <option value="">Select Specification</option>

        <option value="CEM IIN">Cement - CEM IIN</option>
        <option value="CEM IIIN">Cement - CEM IIIN</option>

        <option value="BAR 10MM">Iron Bar - 10MM</option>
        <option value="BAR 12MM">Iron Bar - 12MM</option>
        <option value="BAR 16MM">Iron Bar - 16MM</option>

        <option value="NAIL 0001">Nails - 1 inch</option>
        <option value="NAIL 0003">Nails - 3 inch</option>
        <option value="NAIL 0004">Nails - 4 inch</option>
        <option value="NAIL 0005">Nails - 5 inch</option>
        <option value="ROOF NAIL">Roofing Nails</option>

        <option value="WIRE MESH">Wire Mesh</option>
        <option value="BARBED HIGH">Barbed Wire - High Tensile</option>
        <option value="BARBED LOW">Barbed Wire - Low Tensile</option>
        <option value="others">Other tools</option>
        <option value="WHEEL BARROW">Wheel Barrow</option>
    </select>
</div>


<div class="section">PAYMENT</div>

<div class="col">
    <label>Mode of Payment</label>
    <select name="payment_mode" required>
        <option value="">Select</option>
        <option>Cash</option>
        <option>Mobile Money</option>
        <option>Bank Transfer</option>
        <option>Credit</option>
    </select> 
</div>

<div></div>
        <!-- Submit -->
        <button type="submit">Add Stock</button>

    </form>
</div>
    
{% endblock %}
