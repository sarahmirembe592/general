{% extends 'base.html' %}
{% block content %}
<style>
           body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            border: none;
            background-color: green;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
        /* Navbar Container */
.navbar {
  display: flex;
  justify-content: space-between; /* Pushes logo and links to opposite sides */
  align-items: center;
  padding: 15px 30px;
  background-color: #333;
  color: white;
  position: sticky; /* Keeps navbar at the top while scrolling */
  top: 0;
  z-index: 1000;
  margin-top: 20px;
}

/* Logo Styling */
.logo {
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
}

/* Links Layout */
.nav-links {
  list-style: none; /* Removes bullet points */
  display: flex;
  gap: 20px; /* Space between links */
}

/* Individual Link Styling */
.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: color 0.3s ease;
}

/* Hover Effect */
.nav-links a:hover {
  color: #04AA6D; /* Changes color on hover */
}

/* Action Button (Optional) */
.cta {
  background-color: #04AA6D;
  padding: 8px 15px;
  border-radius: 5px;
}

.cta:hover {
  background-color: #059862;
  color: white !important;
}
</style>
   <nav class="navbar">
  <div class="logo">Welcome to Nyondo</div>
  <ul class="nav-links">
    <li><a href="/">Stock</a></li>
    <li><a href="/home1">Sales</a></li>
    <!-- <li><a href="/home2">Home2</a></li> -->
    <li><a href="/home3">Customers</a></li>
    
  </ul>
  </nav>

    <h3 style="text-align: center; margin-top: 10px;">Customer Savings Scheme</h3>

<div class="container">

    <!-- Registration Form -->
    <div class="card">
        <h2>Customer Registration</h2>
        <form method="POST" action="{% url 'add3'%}">
            {% csrf_token %}
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter full name" required>

            <label>NIN Number</label>
            <input type="text" maxlength="14" name="nin" placeholder="Enter NIN" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" maxlength="14" placeholder="Enter phone number" required>

            <label>Address</label>
            <input type="text" name="address" placeholder="Enter address" required>

            <label>Select Product</label>
            <select name="select_product">
                <option>Cement</option>
                <option>Iron Bars</option>
                <option>Iron Sheets</option>
                <option>Wheel Barrow</option>
                <option>Wire Mesh</option>
                <option>Roofing Nails</option>
                <option>Nails</option>
            </select>

            <label>Amount Deposited (UGX)</label>
            <input type="number" name="amount" placeholder="Enter amount" required>

        <label for="Payment method">Payment Method</label>
        <select class="form-select" name="payment_method">
          <option selected> select Method</option>
          <option>Cash</option>
          <option>Mobile Money</option>
          <option>Bank Transfer</option>
          <option>Credit(Approved)</option>
        </select>

            

            <button type="submit">Register Customer</button>
        </form>
    </div>

    
{% endblock %}
